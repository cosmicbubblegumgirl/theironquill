apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-replica
  labels:
    app: redis
    role: replica
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
      role: replica
  template:
    metadata:
      labels:
        app: redis
        role: replica
    spec:
      containers:
        - name: redis-replica
          image: redis:7-alpine
          command: ["redis-server", "--replicaof", "redis-master", "6379"]
          ports:
            - containerPort: 6379
          resources:
            requests:
              cpu: 20m
              memory: 64Mi
            limits:
              cpu: 80m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: redis-replica
  labels:
    app: redis
    role: replica
spec:
  selector:
    app: redis
    role: replica
  ports:
    - port: 6379
      targetPort: 6379
