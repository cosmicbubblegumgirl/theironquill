apiVersion: apps/v1
kind: Deployment
metadata:
  name: guestbook
  labels:
    app: guestbook
spec:
  replicas: 1
  selector:
    matchLabels:
      app: guestbook
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
  template:
    metadata:
      labels:
        app: guestbook
    spec:
      containers:
        - name: guestbook
          image: us.icr.io/<your-namespace>/guestbook:v2
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: REDIS_MASTER_SERVICE_HOST
              value: redis-master
            - name: REDIS_MASTER_SERVICE_PORT
              value: "6379"
            - name: REDIS_REPLICA_SERVICE_HOST
              value: redis-replica
            - name: REDIS_REPLICA_SERVICE_PORT
              value: "6379"
          resources:
            requests:
              cpu: 5m
              memory: 96Mi
            limits:
              cpu: 50m
              memory: 192Mi
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
